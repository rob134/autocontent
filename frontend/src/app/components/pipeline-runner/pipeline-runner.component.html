<div class="pipeline-runner">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="pipeline-form">
    <div class="form-group">
      <label for="channel_id">Select Channel</label>
      <select
        id="channel_id"
        formControlName="channel_id"
        class="form-select"
        [disabled]="loading || channels.length === 0"
      >
        <option value="">Choose a channel...</option>
        <option *ngFor="let channel of channels" [value]="channel.id">
          {{ channel.name }} ({{ channel.platform }})
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="mode">Content Mode</label>
      <select
        id="mode"
        formControlName="mode"
        class="form-select"
        [disabled]="loading"
      >
        <option value="curated">Curated (Trending)</option>
        <option value="avatar">Avatar (Phase 3)</option>
        <option value="ads">Ads (Phase 2)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="content_keyword">Content Keyword (Optional)</label>
      <input
        id="content_keyword"
        type="text"
        formControlName="content_keyword"
        class="form-input"
        placeholder="e.g., Technology, Gaming, etc."
        [disabled]="loading"
      />
    </div>

    <button type="submit" class="run-button" [disabled]="!form.valid || loading">
      {{ loading ? '⏳ Running Pipeline...' : '▶️ Run Pipeline' }}
    </button>
  </form>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <div *ngIf="currentPipeline" class="pipeline-status">
    <h3>Pipeline Status</h3>
    <div class="status-box" [class]="'status-' + currentPipeline.status">
      <strong>Status:</strong> {{ currentPipeline.status | uppercase }}
    </div>
    <p><strong>Generated Title:</strong> {{ currentPipeline.generated_title || 'Generating...' }}</p>
    <p><strong>Generated Description:</strong> {{ currentPipeline.generated_description || 'Generating...' }}</p>
  </div>

  <app-logs-viewer [logs]="logs"></app-logs-viewer>
</div>
