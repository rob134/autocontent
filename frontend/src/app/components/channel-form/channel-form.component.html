<form [formGroup]="form" (ngSubmit)="onSubmit()" class="channel-form">
  <h3>Create New Channel</h3>

  <div class="form-group">
    <label for="name">Channel Name</label>
    <input
      id="name"
      type="text"
      formControlName="name"
      class="form-input"
      placeholder="e.g., My YouTube Channel"
      [disabled]="loading"
    />
  </div>

  <div class="form-group">
    <label for="platform">Platform</label>
    <select
      id="platform"
      formControlName="platform"
      class="form-select"
      [disabled]="loading"
    >
      <option value="youtube">YouTube</option>
      <option value="tiktok">TikTok (Phase 2)</option>
      <option value="instagram">Instagram (Phase 2)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="mode">Content Mode</label>
    <select
      id="mode"
      formControlName="mode"
      class="form-select"
      [disabled]="loading"
    >
      <option value="curated">Curated (Trending)</option>
      <option value="avatar">Avatar (Phase 3)</option>
      <option value="ads">Ads (Phase 2)</option>
    </select>
  </div>

  <button type="submit" class="submit-button" [disabled]="!form.valid || loading">
    {{ loading ? 'Creating...' : 'Create Channel' }}
  </button>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>
  <div *ngIf="success" class="alert alert-success">{{ success }}</div>
</form>
