apiVersion: apps/v1
kind: Deployment
metadata: { name: autocontent-backend }
spec:
  replicas: 2
  selector: { matchLabels: { app: autocontent-backend } }
  template:
    metadata: { labels: { app: autocontent-backend } }
    spec:
      containers:
      - name: backend
        image: autocontent/backend:latest
        env:
        - name: JAVA_ORCHESTRATOR_URL
          value: http://autocontent-orchestrator:8080/api/v1/orchestrator/enqueue
        ports: [{containerPort: 8000}]
---
apiVersion: v1
kind: Service
metadata: { name: autocontent-backend }
spec:
  selector: { app: autocontent-backend }
  ports: [{ port: 8000, targetPort: 8000 }]
