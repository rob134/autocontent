<div class="chat-shell">
  <div class="chat-header">
    <h2>AutoContent Copilot</h2>
    <p>UX conversacional para busca, edição generativa e publicação multi-plataforma.</p>
  </div>

  <div class="chat-thread">
    <div class="msg" *ngFor="let msg of messages" [class.user]="msg.role === 'user'">
      <div class="bubble">
        <p>{{ msg.content }}</p>
        <ul *ngIf="msg.meta?.length">
          <li *ngFor="let step of msg.meta">{{ step }}</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="composer">
    <textarea [(ngModel)]="prompt" rows="3" placeholder="Ex.: encontre podcasts de marketing e gere 10 cortes com maior retenção..."></textarea>
    <button (click)="sendPrompt()" [disabled]="loading">{{ loading ? 'Processando...' : 'Enviar' }}</button>
  </div>

  <div *ngIf="error" class="error">{{ error }}</div>
</div>
