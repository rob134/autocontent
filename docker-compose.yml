version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: autocontent-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./autocontent.db
      - SECRET_KEY=dev-secret-key-change-in-production
      - YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID:-your_client_id}
      - YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET:-your_client_secret}
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
      - ./temp:/app/temp
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - autocontent-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: autocontent-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - autocontent-network

networks:
  autocontent-network:
    driver: bridge
