<div class="dashboard">
  <div class="tabs">
    <button 
      class="tab-button" 
      [class.active]="activeTab === 'channels'"
      (click)="setActiveTab('channels')">
      📺 Channels
    </button>
    <button 
      class="tab-button" 
      [class.active]="activeTab === 'pipeline'"
      (click)="setActiveTab('pipeline')">
      ⚙️ Run Pipeline
    </button>
  </div>

  <div class="tab-content">
    <div *ngIf="activeTab === 'channels'" class="tab-pane">
      <h2>Channel Management</h2>
      <app-channel-list [channels]="channels" (refresh)="loadChannels()"></app-channel-list>
      <app-channel-form (created)="loadChannels()"></app-channel-form>
    </div>

    <div *ngIf="activeTab === 'pipeline'" class="tab-pane">
      <h2>Pipeline Execution</h2>
      <app-pipeline-runner [channels]="channels"></app-pipeline-runner>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>
  <div *ngIf="loading" class="spinner">Loading...</div>
</div>
